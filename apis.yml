description: >-
  Regeneron Pharmaceuticals is a leading biotechnology company that invents,
  develops, and commercializes life-transforming medicines, including EYLEA
  and EYLEA HD for ophthalmology, Dupixent in immunology (co-developed with
  Sanofi), Libtayo and Lynozyfic in oncology and hematology, and Praluent
  for cardiovascular disease. Regeneron does not publish a public developer
  API; its Regeneron Genetics Center collaborates on large-scale genomic
  research via the UK Biobank, DiscovEHR, and partner platforms rather than
  a self-hosted API.
